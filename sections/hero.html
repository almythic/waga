<section class="hero" id="hero">

  <!-- Video background — portrait 9:16, covers viewport via object-fit -->

    class="hero-video"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    poster="hero-poster.jpg"
  >
    <source src="hero-video.mp4" type="video/mp4" />
  </video>

  <!-- Dark tint layer -->
  <div class="hero-tint"></div>

  <!-- Contrast vignette -->

    <hr class="hero-rule" />
    <p class="hero-subline">
      A medically guided detox program, rooted in 20&nbsp;years
      of nutritional science. Delivered to your door.
    </p>
    <div class="hero-actions">
      <a href="#order" class="btn btn-accent btn-lg">Begin Your Program</a>
      <a href="#program" class="btn btn-ghost-inv btn-lg">Discover More</a>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="hero-scroll">
    <span class="hero-scroll-text">Scroll</span>
    <div class="hero-scroll-line"></div>
  </div>

</section>
